            const [selected, setSelected] = useState(null);

                { id: 'B', text: "It allows for a declarative API and batch updates, improving maintainability." },
                { id: 'C', text: "It consumes less memory." }
            ];

            const handleSubmit = () => {
                if (selected === 'B') {
                    navigate('/feedback');
                } else if (selected) {
                    alert("Try option B for the correct insight!");
                }
            };

            return (
                <div className="bg-background min-h-screen flex flex-col text-text-main">
                    <SimpleHeader title="PineSnap" />

                                            className="peer sr-only" 
                                            name="answer" 
                                            type="radio"
